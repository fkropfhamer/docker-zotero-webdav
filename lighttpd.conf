server.document-root = "/var/www/html/webdav"
server.port = 80
server.modules = (
  "mod_access",
  "mod_auth",
  "mod_webdav",
  "mod_authn_file"
)

auth.backend = "htpasswd"
auth.backend.htpasswd.userfile = "/etc/lighttpd/webdav.user"
auth.require = (
  "/" => (
    "method"  => "basic",
    "realm"   => "WebDAV",
    "require" => "valid-user"
  )
)

webdav.activate = "enable"
webdav.is-readonly = "disable"
